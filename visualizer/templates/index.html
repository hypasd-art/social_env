<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Interaction Visualizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; color: #58a6ff; }
.header .data-dir { font-size: 12px; color: #8b949e; }
.layout { display: flex; height: calc(100vh - 50px); }
.sidebar { width: 320px; min-width: 320px; border-right: 1px solid #30363d; overflow-y: auto; padding: 12px; background: #161b22; }
.main { flex: 1; overflow-y: auto; padding: 20px; }
.episode-card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: border-color .2s; }
.episode-card:hover { border-color: #58a6ff; }
.episode-card.active { border-color: #58a6ff; background: #1c2533; }
.episode-card .title { font-weight: 600; font-size: 14px; }
.episode-card .meta { font-size: 12px; color: #8b949e; margin-top: 4px; }
.episode-card .score { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin: 4px 4px 0 0; }
.score-success { background: #1a3d2f; color: #3fb950; }
.score-fail { background: #3d1a1a; color: #f85149; }
.score-timeout { background: #3d351a; color: #d2991d; }
/* Section panels */
.section { background: #21262d; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.section-header { background: #1c2128; padding: 10px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid #30363d; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.section-header:hover { background: #252d38; }
.section-body { padding: 16px; }
/* Agent score grid */
.score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.agent-card { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
.agent-card h4 { font-size: 14px; margin-bottom: 8px; color: #58a6ff; }
.agent-card .overall { font-size: 24px; font-weight: 700; color: #d2a8ff; margin-bottom: 8px; }
.dimension-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; border-bottom: 1px solid #30363d33; }
.dimension-row .dim-name { color: #8b949e; }
.dimension-row .dim-score { font-weight: 600; }
/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #30363d; }
.timeline-entry { position: relative; margin-bottom: 12px; padding: 8px 12px; background: #1c2128; border: 1px solid #30363d; border-radius: 6px; }
.timeline-entry::before { content: ''; position: absolute; left: -20px; top: 12px; width: 8px; height: 8px; border-radius: 50%; background: #58a6ff; }
.timeline-entry.sched::before { background: #d2991d; }
.timeline-entry.session::before { background: #3fb950; }
.timeline-entry.action::before { background: #f85149; }
.timeline-entry .ts-badge { font-size: 11px; padding: 1px 6px; border-radius: 8px; margin-right: 8px; }
.badge-sched { background: #3d351a; color: #d2991d; }
.badge-session { background: #1a3d2f; color: #3fb950; }
.badge-action { background: #3d1a1a; color: #f85149; }
.timeline-entry .entry-agent { font-weight: 600; font-size: 13px; }
.timeline-entry .entry-content { font-size: 13px; color: #c9d1d9; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
/* Chat-style messages */
.chat-msg { display: flex; gap: 12px; margin-bottom: 12px; }
.chat-msg .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.chat-msg .bubble { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; max-width: 70%; font-size: 14px; }
.chat-msg .bubble .sender { font-size: 12px; color: #58a6ff; margin-bottom: 4px; font-weight: 600; }
.chat-msg.right { flex-direction: row-reverse; }
.chat-msg.right .bubble { background: #1a3d5c; border-color: #1f6feb44; }
/* Contract card */
.contract-card { background: #1c2128; border: 1px solid #3fb95044; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
.contract-card .contract-title { color: #3fb950; font-weight: 600; margin-bottom: 4px; }
/* Rule metrics table */
.metrics-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.metrics-table td { padding: 4px 12px; border-bottom: 1px solid #30363d33; }
.metrics-table td:first-child { color: #8b949e; width: 40%; }
.metrics-table td:last-child { font-weight: 600; text-align: right; }
/* Tab bar */
.tabs { display: flex; gap: 0; border-bottom: 1px solid #30363d; margin-bottom: 16px; }
.tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: none; color: #8b949e; font-size: 14px; border-bottom: 2px solid transparent; transition: all .2s; }
.tab-btn:hover { color: #e1e4e8; }
.tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
/* Placeholder */
.empty-state { text-align: center; padding: 60px 20px; color: #484f58; }
.empty-state svg { margin-bottom: 16px; opacity: 0.3; }
</style>
</head>
<body>
<div class="header">
    <h1> Agent Interaction Visualizer</h1>
    <span class="data-dir" id="dataDir"></span>
</div>
<div class="layout">
    <!-- Sidebar: episode list -->
    <div class="sidebar" id="sidebar">
        <div class="empty-state" id="sidebarEmpty">
            <p>Loading runs...</p>
        </div>
    </div>
    <!-- Main content -->
    <div class="main" id="main">
        <div class="empty-state" id="mainEmpty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
            <p>Select an episode from the sidebar to view details</p>
        </div>
    </div>
</div>

<script>
const API_BASE = '';

let currentRunId = null;
let currentDetail = null;

async function loadRuns() {
    const sidebar = document.getElementById('sidebar');
    try {
        const resp = await fetch(API_BASE + '/api/runs');
        const runs = await resp.json();
        document.getElementById('dataDir').textContent = runs.length + ' evaluation runs found';
        if (!runs.length) {
            document.getElementById('sidebarEmpty').innerHTML = '<p>No runs found</p>';
            return;
        }
        sidebar.innerHTML = '';
        runs.forEach(run => {
            const card = document.createElement('div');
            card.className = 'episode-card';
            const succRate = (run.success_rate * 100).toFixed(1);
            const sClass = run.success_rate >= 0.8 ? 'score-success' : run.success_rate >= 0.5 ? 'score-timeout' : 'score-fail';
            card.innerHTML = `
                <div class="title">${esc(run.id)}</div>
                <div class="meta">
                    ${run.timestamp ? esc(run.timestamp) + ' · ' : ''}
                    ${run.n_episodes} episodes
                    ${run.agent_models.length ? ' · ' + run.agent_models.join(', ') : ''}
                </div>
                <span class="score ${sClass}">success ${succRate}%</span>
                ${Object.entries(run.llm_overall_mean || {}).map(([k,v]) => `<span class="score score-timeout">${k}: ${Number(v).toFixed(3)}</span>`).join('')}
            `;
            card.onclick = () => loadRun(run.id, card);
            sidebar.appendChild(card);
        });
    } catch (e) {
        document.getElementById('sidebarEmpty').innerHTML = '<p>Error: ' + esc(String(e)) + '</p>';
    }
}

async function loadRun(runId, cardEl) {
    currentRunId = runId;
    document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
    if (cardEl) cardEl.classList.add('active');

    try {
        const resp = await fetch(API_BASE + '/api/run/' + runId);
        const data = await resp.json();
        currentDetail = data;
        renderRunDetail(data);
    } catch (e) {
        document.getElementById('main').innerHTML = '<div class="empty-state"><p>Error loading: ' + esc(String(e)) + '</p></div>';
    }
}

function renderRunDetail(data) {
    const main = document.getElementById('main');
    const agg = data.aggregate_means || {};
    const overall = agg.overall || agg;
    const rows = data.rows || [];

    let html = '';

    // Tabs
    html += '<div class="tabs">';
    html += '<button class="tab-btn active" onclick="switchTab(event, \'overview\')">Overview</button>';
    html += '<button class="tab-btn" onclick="switchTab(event, \'episodes\')">Episodes (' + rows.length + ')</button>';
    html += '<button class="tab-btn" onclick="switchTab(event, \'llmScores\')">LLM Scores</button>';
    html += '<button class="tab-btn" onclick="switchTab(event, \'metrics\')">Rule Metrics</button>';
    html += '</div>';

    // Overview tab
    html += '<div class="tab-content active" id="tab-overview">';
    html += buildOverview(overall, rows, data);
    html += '</div>';

    // Episodes tab
    html += '<div class="tab-content" id="tab-episodes">';
    html += buildEpisodesList(rows, data);
    html += '</div>';

    // LLM Scores tab
    html += '<div class="tab-content" id="tab-llmScores">';
    html += buildLLMScores(overall, rows);
    html += '</div>';

    // Metrics tab
    html += '<div class="tab-content" id="tab-metrics">';
    html += buildMetrics(overall);
    html += '</div>';

    main.innerHTML = html;
}

function buildOverview(overall, rows, data) {
    const n = overall.n_episodes || rows.length;
    const succRate = overall.terminal_success_rate || 0;
    const rm = overall.rule_metrics_mean || {};

    let h = '<div class="score-grid">';
    // Summary card
    h += '<div class="agent-card">';
    h += '<h4>Run Summary</h4>';
    h += '<div class="dimension-row"><span class="dim-name">Episodes</span><span class="dim-score">' + n + '</span></div>';
    h += '<div class="dimension-row"><span class="dim-name">Success Rate</span><span class="dim-score">' + (succRate * 100).toFixed(1) + '%</span></div>';
    h += '<div class="dimension-row"><span class="dim-name">Final State Score</span><span class="dim-score">' + fmtNum(rm.negotiation_final_state_score) + '</span></div>';
    h += '<div class="dimension-row"><span class="dim-name">Model</span><span class="dim-score">' + esc((data.agent_models || []).join(', ') || data.evaluator_model || '?') + '</span></div>';
    h += '</div>';

    // LLM overall card
    const llmOverall = overall.llm_overall_mean || {};
    if (Object.keys(llmOverall).length) {
        h += '<div class="agent-card">';
        h += '<h4>LLM Overall (mean)</h4>';
        for (const [k, v] of Object.entries(llmOverall)) {
            h += '<div class="dimension-row"><span class="dim-name">' + esc(k) + '</span><span class="dim-score">' + fmtNum(v) + '</span></div>';
        }
        h += '</div>';
    }

    // LLM dimension scores
    const dimScores = overall.llm_dimension_scores_mean || {};
    for (const [agent, dims] of Object.entries(dimScores)) {
        h += '<div class="agent-card">';
        h += '<h4>' + esc(agent) + '</h4>';
        if (dims && typeof dims === 'object') {
            const overallScore = dims.overall_score;
            if (overallScore !== undefined) {
                h += '<div class="overall">' + fmtNum(overallScore) + '</div>';
            }
            for (const [dk, dv] of Object.entries(dims)) {
                if (dk === 'overall_score') continue;
                h += '<div class="dimension-row"><span class="dim-name">' + esc(dk) + '</span><span class="dim-score">' + fmtNum(dv) + '</span></div>';
            }
        }
        h += '</div>';
    }
    h += '</div>';
    return h;
}

function buildEpisodesList(rows, data) {
    let h = '<div style="font-size:13px;color:#8b949e;margin-bottom:12px;">' + rows.length + ' episodes</div>';
    rows.forEach((r, i) => {
        const term = r.terminal || '?';
        const sClass = term === 'success' ? 'score-success' : term === 'timeout' ? 'score-timeout' : 'score-fail';
        h += '<div class="section">';
        h += '<div class="section-header" onclick="this.parentElement.querySelector(\'.section-body\').classList.toggle(\'hidden\')">';
        h += '<span>#' + (r.seq != null ? r.seq : i) + ' · ' + esc(r.scenario_codename || r.experiment_tag || '') + '</span>';
        h += '<span class="score ' + sClass + '">' + esc(term) + '</span>';
        h += '</div>';
        h += '<div class="section-body">';
        h += '<table class="metrics-table">';
        h += '<tr><td>Agent Model</td><td>' + esc(r.agent_model || '?') + '</td></tr>';
        h += '<tr><td>Evaluator</td><td>' + esc(r.evaluator_model || '?') + '</td></tr>';
        h += '<tr><td>Participants</td><td>' + (r.num_participants || '?') + '</td></tr>';
        h += '<tr><td>Terminal</td><td>' + esc(term) + '</td></tr>';
        if (r.rule_metrics) {
            h += '<tr><td>Final State Score</td><td>' + fmtNum(r.rule_metrics.negotiation_final_state_score) + '</td></tr>';
            h += '<tr><td>Macro Steps</td><td>' + fmtNum(r.rule_metrics.negotiation_macro_steps_used) + '</td></tr>';
            h += '<tr><td>Sessions</td><td>' + fmtNum(r.rule_metrics.negotiation_n_session_log) + '</td></tr>';
            h += '<tr><td>Contract Phase</td><td>' + fmtNum(r.rule_metrics.negotiation_primary_contract_phase) + '</td></tr>';
            // Predefined rule scores
            if (r.rule_metrics.negotiation_predefined_rule_score !== undefined) {
                h += '<tr><td>Predef Rule Score</td><td>' + fmtNum(r.rule_metrics.negotiation_predefined_rule_score) + '</td></tr>';
                if (r.rule_metrics.negotiation_predefined_rule_realized_margin !== undefined)
                    h += '<tr><td>Realized Margin</td><td>' + fmtNum(r.rule_metrics.negotiation_predefined_rule_realized_margin) + '</td></tr>';
                if (r.rule_metrics.negotiation_predefined_rule_total_profit !== undefined)
                    h += '<tr><td>Total Profit</td><td>' + fmtNum(r.rule_metrics.negotiation_predefined_rule_total_profit) + '</td></tr>';
            }
        }
        h += '</table>';
        // LLM dimension scores per episode
        const dims = r.llm_dimension_scores || {};
        if (Object.keys(dims).length) {
            h += '<div style="margin-top:8px;font-weight:600;font-size:13px;color:#8b949e;">LLM Dimension Scores</div>';
            for (const [agent, dd] of Object.entries(dims)) {
                h += '<div style="font-size:12px;color:#58a6ff;margin-top:4px;">' + esc(agent) + '</div>';
                for (const [dk, dv] of Object.entries(dd || {})) {
                    h += '<div class="dimension-row"><span class="dim-name">' + esc(dk) + '</span><span class="dim-score">' + fmtNum(dv) + '</span></div>';
                }
            }
        }
        h += '</div></div>';
    });
    return h;
}

function buildLLMScores(overall, rows) {
    const dimScores = overall.llm_dimension_scores_mean || {};
    if (!Object.keys(dimScores).length) return '<div class="empty-state"><p>No LLM evaluation scores available</p></div>';

    let h = '<div class="score-grid">';
    for (const [agent, dims] of Object.entries(dimScores)) {
        if (!dims || typeof dims !== 'object') continue;
        h += '<div class="agent-card">';
        h += '<h4>' + esc(agent) + '</h4>';
        const overallScore = dims.overall_score;
        if (overallScore !== undefined) {
            h += '<div class="overall">' + fmtNum(overallScore) + '</div>';
        }
        for (const [dk, dv] of Object.entries(dims)) {
            if (dk === 'overall_score') continue;
            const pct = Math.max(0, Math.min(100, (Number(dv) / 10) * 100));
            h += '<div class="dimension-row">';
            h += '<span class="dim-name">' + esc(dk) + '</span>';
            h += '<span class="dim-score">' + fmtNum(dv) + '</span>';
            h += '</div>';
            // Mini bar
            h += '<div style="height:3px;background:#30363d;border-radius:2px;margin:2px 0 6px;">';
            h += '<div style="height:3px;width:' + pct + '%;background:linear-gradient(90deg,#58a6ff,#3fb950);border-radius:2px;"></div></div>';
        }
        h += '</div>';
    }
    h += '</div>';
    return h;
}

function buildMetrics(overall) {
    const rm = overall.rule_metrics_mean || {};
    if (!Object.keys(rm).length) return '<div class="empty-state"><p>No rule metrics available</p></div>';

    let h = '<div class="score-grid">';

    // General metrics
    h += '<div class="agent-card"><h4>General</h4>';
    h += '<table class="metrics-table">';
    const generalKeys = ['negotiation_terminal_is_success', 'negotiation_terminal_is_timeout', 'negotiation_terminal_is_failure',
        'negotiation_macro_steps_used', 'negotiation_n_session_log', 'negotiation_n_action_log', 'negotiation_n_message_log'];
    for (const k of generalKeys) {
        if (rm[k] !== undefined) h += '<tr><td>' + esc(k) + '</td><td>' + fmtNum(rm[k]) + '</td></tr>';
    }
    h += '</table></div>';

    // Cash & resources
    h += '<div class="agent-card"><h4>Financial</h4>';
    h += '<table class="metrics-table">';
    const finKeys = Object.keys(rm).filter(k => k.includes('cash') || k.includes('profit') || k.includes('solvency') || k.includes('liquidity'));
    for (const k of finKeys) {
        if (rm[k] !== undefined) h += '<tr><td>' + esc(k) + '</td><td>' + fmtNum(rm[k]) + '</td></tr>';
    }
    h += '</table></div>';

    // Contract & predefined rule
    h += '<div class="agent-card"><h4>Contract &amp; Rules</h4>';
    h += '<table class="metrics-table">';
    const contractKeys = Object.keys(rm).filter(k => k.includes('contract') || k.includes('predefined_rule'));
    for (const k of contractKeys) {
        if (rm[k] !== undefined) h += '<tr><td>' + esc(k) + '</td><td>' + fmtNum(rm[k]) + '</td></tr>';
    }
    h += '</table></div>';

    // Final state score components
    const fsKeys = Object.keys(rm).filter(k => k.startsWith('negotiation_final_state_score_component_'));
    if (fsKeys.length) {
        h += '<div class="agent-card"><h4>Final State Score Components</h4>';
        h += '<table class="metrics-table">';
        for (const k of fsKeys) {
            h += '<tr><td>' + esc(k.replace('negotiation_final_state_score_component_', '')) + '</td><td>' + fmtNum(rm[k]) + '</td></tr>';
        }
        h += '</table></div>';
    }

    h += '</div>';
    return h;
}

function switchTab(evt, tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    evt.target.classList.add('active');
    const tabEl = document.getElementById('tab-' + tabName);
    if (tabEl) tabEl.classList.add('active');
}

function fmtNum(v) {
    if (v == null) return 'n/a';
    if (typeof v === 'number') {
        if (Number.isInteger(v)) return String(v);
        return v.toFixed(4);
    }
    return String(v);
}

function esc(s) {
    const div = document.createElement('div');
    div.textContent = String(s);
    return div.innerHTML;
}

// Init
loadRuns();
</script>
</body>
</html>
